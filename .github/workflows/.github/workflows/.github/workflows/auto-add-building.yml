name: Neues Gebäude hinzufügen

on:
  schedule:
    # Läuft um 06:00 und 18:00 UTC — alle 12 Stunden
    - cron: '0 6,18 * * *'
  workflow_dispatch: {} # erlaubt manuelles Auslösen über den "Actions"-Tab auf GitHub

permissions:
  contents: write

jobs:
  add-building:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Neues Gebäude generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/add-building.mjs

      - name: Änderungen committen und pushen
        run: |
          git config user.name "bauwerk-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/buildings.json data/queue.json
          git diff --cached --quiet && echo "Keine Änderungen" || git commit -m "Neues Gebäude automatisch hinzugefügt"
          git push
